# Optional local PostgreSQL for development without Supabase cloud.
# For production, use Supabase — see README.md and .env.example
services:
  postgres:
    image: postgres:16-alpine
    container_name: wine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wine
    ports:
      - "5432:5432"
    volumes:
      - wine_pg_data:/var/lib/postgresql/data

volumes:
  wine_pg_data:
